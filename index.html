        .header-container {

            display: flex;

        }

        .gallery-item:hover {

        }

        .gallery-item img {

            object-fit: cover;

        }

        .gallery-item:hover img {

        .gallery-overlay {

            .container {

            }

            .services-grid {

        @media (max-width: 480px) {

            }

            .service-card {

            }
        }

        /* Scroll Animations */
        .fade-in {
            opacity: 0;
            transform: translateY(60px);
            transition: all 1s ease;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Smooth Scrolling */
        html {
            scroll-behavior: smooth;
        }
    </style>
